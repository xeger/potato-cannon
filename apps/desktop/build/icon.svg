<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#161b22"/>

  <!-- Inner glow/gradient background -->
  <rect x="40" y="40" width="432" height="432" rx="80" fill="url(#bgGradient)"/>

  <!-- Definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2530;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Potato (centered and scaled) -->
  <g transform="translate(256, 256) scale(12)">
    <!-- Motion lines -->
    <line x1="-15" y1="-2" x2="-11" y2="-2" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-16" y1="1" x2="-12" y2="1" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-14" y1="4" x2="-10" y2="4" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Potato body -->
    <ellipse cx="0" cy="0" rx="11" ry="9" fill="#7eb8e8" stroke="#4a8bc7" stroke-width="0.8"/>

    <!-- Potato spots -->
    <circle cx="-4" cy="-3" r="1.5" fill="#4a8bc7" opacity="0.6"/>
    <circle cx="3" cy="-5" r="1" fill="#4a8bc7" opacity="0.6"/>
    <circle cx="-2" cy="3" r="1.2" fill="#4a8bc7" opacity="0.6"/>
    <circle cx="5" cy="1" r="0.8" fill="#4a8bc7" opacity="0.6"/>
  </g>
</svg>
